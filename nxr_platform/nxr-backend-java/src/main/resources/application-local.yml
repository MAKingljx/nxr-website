spring:
  datasource:
    url: jdbc:h2:file:./.local-data/nxr_platform;MODE=MySQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration-h2

nxr:
  media:
    public-base-url: http://127.0.0.1:8088
  public-site:
    base-url: http://127.0.0.1:3000
