spring:
  application:
    name: nxr-backend-java
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/nxr_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: nxr
    password: nxr_dev_password
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: health,info

nxr:
  media:
    storage-root: ./.local-data/media
    public-base-url: https://nxrgrading.com
  public-site:
    base-url: https://nxrgrading.com
