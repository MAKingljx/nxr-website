services:
  nxr-mysql:
    image: mysql:8.4
    container_name: nxr-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_password
      MYSQL_DATABASE: nxr_platform
      MYSQL_USER: nxr
      MYSQL_PASSWORD: nxr_dev_password
    ports:
      - "3306:3306"
    volumes:
      - nxr_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-unxr", "-pnxr_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  nxr_mysql_data:
