<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXR 网站可视化编辑器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background: #f5f5f7; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 18px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 32px; font-weight: 700; color: #1d1d1f; margin-bottom: 24px; }
        .section { margin-bottom: 32px; padding: 20px; border: 1px solid #e5e5ea; border-radius: 12px; }
        .section h3 { font-size: 20px; font-weight: 600; color: #0071e3; margin-bottom: 16px; }
        button { padding: 10px 20px; border-radius: 980px; border: none; background: #0071e3; color: white; font-size: 17px; font-weight: 500; cursor: pointer; }
        button:hover { background: #0077ed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NXR 网站可视化编辑器（本地版）</h1>
        <div class="section">
            <h3>🖼️ 更换图片</h3>
            <p>选择要替换的图片位置，上传新的PNG图即可</p>
            <input type="file" accept="image/png">
            <button>保存图片</button>
        </div>
        <div class="section">
            <h3>✏️ 编辑文字</h3>
            <p>选择页面和区域，直接修改文字内容</p>
            <select>
                <option>首页 - 英雄区标题</option>
                <option>首页 - 优势区说明</option>
                <option>查询页 - 提示文字</option>
            </select>
            <textarea rows="3" placeholder="输入新文字"></textarea>
            <button>保存文字</button>
        </div>
        <div class="section">
            <h3>🧭 管理导航</h3>
            <p>增删、拖拽排序导航链接</p>
            <ul>
                <li>Home <button>↑</button> <button>↓</button> <button>✕</button></li>
                <li>Card Lookup <button>↑</button> <button>↓</button> <button>✕</button></li>
                <li>Submit Cards <button>↑</button> <button>↓</button> <button>✕</button></li>
                <li>About <button>↑</button> <button>↓</button> <button>✕</button></li>
            </ul>
            <button>+ 添加新链接</button>
        </div>
    </div>
</body>
</html>
