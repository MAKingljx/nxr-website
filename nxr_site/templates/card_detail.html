<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Details - NXR Grading</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: #f5f5f7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .section-title { font-size: 36px; font-weight: 700; color: #1d1d1f; margin-bottom: 30px; text-align: center; }
        .card-details { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .detail-item { margin-bottom: 20px; }
        .detail-label { font-size: 18px; font-weight: 600; color: #1d1d1f; display: inline-block; width: 200px; }
        .detail-value { font-size: 18px; color: #515154; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">{% include 'nav.html' %}</nav>
        
        <h1 class="section-title">Card Details</h1>
        
        <div class="card-details">
            <div class="detail-item">
                <span class="detail-label">Certificate Number:</span>
                <span class="detail-value">NXR20240323001</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Card Name:</span>
                <span class="detail-value">Charizard Base Set 4/102</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Year:</span>
                <span class="detail-value">1999</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Grade:</span>
                <span class="detail-value">9.5 (Gem Mint)</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Subgrades:</span>
                <span class="detail-value">Centering: 9.5, Edges: 9.5, Corners: 9.0, Surface: 10</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Graded On:</span>
                <span class="detail-value">March 23, 2024</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Authentication:</span>
                <span class="detail-value">Verified Authentic</span>
            </div>
        </div>
        
        <footer class="footer">{% include 'footer.html' %}</footer>
    </div>
</body>
</html>
