<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}NXR Grading{% endblock %}</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/static/images/nxr-logo-circle.png">
{% block extra_head %}{% endblock %}
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;
  --bg2:#111;
  --bg3:#181818;
  --bg4:#1e1e1e;
  --text:#fff;
  --text2:#999;
  --text3:#666;
  --red:#e94560;
  --red2:#c73652;
  --gold:#f5c842;
  --border:#222;
  --border2:#2a2a2a;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
a{text-decoration:none;color:inherit}
img{max-width:100%}
.nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:200;
  height:64px;
  background:rgba(10,10,10,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
}
.nav-logo{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.nav-logo img{
  width:52px;
  height:52px;
  border-radius:50%;
  object-fit:cover;
  display:block;
  box-shadow:0 10px 28px rgba(0,0,0,.24);
}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{color:var(--text2);font-size:14px;font-weight:500;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-cta{
  background:var(--red);
  color:#fff;
  padding:9px 22px;
  border-radius:4px;
  font-size:14px;
  font-weight:700;
  transition:background .2s;
}
.nav-cta:hover{background:var(--red2)}
.page-hero{
  padding:140px 40px 80px;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid var(--border);
}
.page-hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 70% 80% at 20% 50%,rgba(233,69,96,.08),transparent);
}
.page-hero-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.section-tag{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--red);
  margin-bottom:16px;
}
.page-hero h1{
  font-size:clamp(36px,5vw,64px);
  font-weight:900;
  letter-spacing:-2px;
  line-height:1.05;
  margin-bottom:20px;
}
.page-hero p{font-size:18px;color:var(--text2);max-width:560px;line-height:1.7}
.section{padding:80px 40px}
.section-inner{max-width:1100px;margin:0 auto}
.bg2{background:var(--bg2)}
.bg3{background:var(--bg3)}
.btn-primary{
  display:inline-block;
  background:var(--red);
  color:#fff;
  padding:14px 32px;
  border-radius:4px;
  font-size:15px;
  font-weight:700;
  transition:background .2s;
}
.btn-primary:hover{background:var(--red2)}
.btn-secondary{
  display:inline-block;
  background:transparent;
  color:var(--text);
  padding:14px 32px;
  border-radius:4px;
  font-size:15px;
  font-weight:600;
  border:1px solid var(--border2);
  transition:border-color .2s;
}
.btn-secondary:hover{border-color:var(--text3)}
.cta-strip{
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:48px;
  text-align:center;
  margin-top:80px;
}
.cta-strip h2{
  font-size:clamp(24px,3vw,36px);
  font-weight:900;
  letter-spacing:-1px;
  margin-bottom:12px;
}
.cta-strip p{font-size:15px;color:var(--text2);margin-bottom:28px}
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:60px 40px 32px}
.footer-inner{max-width:1100px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.footer-brand .footer-logo{
  width:68px;
  height:68px;
  border-radius:50%;
  overflow:hidden;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-bottom:18px;
  background:var(--bg3);
  border:1px solid var(--border2);
  box-shadow:0 12px 32px rgba(0,0,0,.22);
}
.footer-brand .footer-logo img{width:100%;height:100%;object-fit:cover;display:block}
.footer-brand p{font-size:13px;color:var(--text3);line-height:1.7;max-width:240px}
.footer-col h4{
  font-size:12px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text2);
  margin-bottom:16px;
}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.footer-col ul a{font-size:13px;color:var(--text3);transition:color .2s}
.footer-col ul a:hover{color:var(--text)}
.footer-bottom{
  border-top:1px solid var(--border);
  padding-top:24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}
.footer-copy{font-size:12px;color:var(--text3)}
.footer-tagline{font-size:12px;color:var(--text3);font-style:italic}
.footer.footer-compact{padding:32px 40px}
.footer-compact .footer-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}
@media(max-width:800px){
  .footer-top{grid-template-columns:1fr 1fr;gap:32px}
}
@media(max-width:768px){
  .nav-links{display:none}
  .nav{padding:0 20px}
}
@media(max-width:600px){
  .page-hero{padding:120px 20px 64px}
  .section{padding:64px 20px}
  .cta-strip{padding:32px 24px}
}
</style>
{% block page_css %}{% endblock %}
</head>
<body>
{% include "components/site_nav.html" %}
{% block content %}{% endblock %}
{% include "components/site_footer.html" %}
{% block page_js %}{% endblock %}
</body>
</html>
